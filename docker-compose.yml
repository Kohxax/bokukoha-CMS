services:
  cms:
    build: .
    restart: unless-stopped
    ports:
      - "3100:3000"    # Cloudflare Tunnel → cms.bokukoha.dev
    volumes:
      - ./data:/app/data   # SQLite永続化
    env_file:
      - .env
    environment:
      - NUXT_DB_PATH=/app/data/cms.db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - tunnel_net
    cloudflared:
      image: cloudflare/cloudflared:latest
      restart: unless-stopped
      command: tunnel run
      volumes:
        - ~/.cloudflared:/etc/cloudflared:ro
      networks:
        - tunnel_net

networks:
  tunnel_net:
    external: true   # cloudflared コンテナと共有するネットワーク
